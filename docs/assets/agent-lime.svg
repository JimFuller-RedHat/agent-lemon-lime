<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Lime body -->
  <ellipse cx="100" cy="140" rx="50" ry="45" fill="#8BC34A" stroke="#6B9B30" stroke-width="2"/>
  <!-- Lime highlight -->
  <ellipse cx="85" cy="125" rx="22" ry="14" fill="#A8D86E" opacity="0.5" transform="rotate(-20 85 125)"/>
  <!-- Lime tip left -->
  <ellipse cx="53" cy="132" rx="10" ry="5" fill="#8BC34A" stroke="#6B9B30" stroke-width="1.5" transform="rotate(-10 53 132)"/>
  <!-- Lime tip right -->
  <ellipse cx="147" cy="132" rx="10" ry="5" fill="#8BC34A" stroke="#6B9B30" stroke-width="1.5" transform="rotate(10 147 132)"/>
  <!-- Leaf -->
  <path d="M100 95 Q108 75 120 80 Q112 95 100 95Z" fill="#4CAF50" stroke="#388E3C" stroke-width="1"/>
  <!-- Stem -->
  <line x1="100" y1="95" x2="100" y2="88" stroke="#795548" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Fedora hat -->
  <!-- Brim -->
  <ellipse cx="100" cy="100" rx="72" ry="14" fill="#2C2C2C" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Crown base -->
  <path d="M55 100 Q55 60 75 50 L125 50 Q145 60 145 100Z" fill="#333333" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Crown indent -->
  <path d="M70 55 Q100 65 130 55 Q125 50 75 50Z" fill="#3d3d3d"/>
  <!-- Hat band -->
  <rect x="58" y="88" width="84" height="8" rx="2" fill="#1a1a1a"/>
  <!-- Band buckle -->
  <rect x="94" y="87" width="12" height="10" rx="1" fill="#C0A000" stroke="#8B7500" stroke-width="0.5"/>
  <rect x="97" y="89" width="6" height="6" rx="0.5" fill="#333333"/>

  <!-- Eyes - slightly narrowed for vigilant look -->
  <ellipse cx="82" cy="132" rx="7" ry="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="118" cy="132" rx="7" ry="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Pupils - looking sideways (watchful) -->
  <circle cx="85" cy="133" r="3.5" fill="#333"/>
  <circle cx="121" cy="133" r="3.5" fill="#333"/>
  <!-- Eye glints -->
  <circle cx="87" cy="131" r="1.2" fill="white"/>
  <circle cx="123" cy="131" r="1.2" fill="white"/>
  <!-- Slight eyebrow raise -->
  <path d="M74 123 Q82 119 92 123" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M108 123 Q118 119 128 123" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knowing smile -->
  <path d="M88 150 Q100 158 114 150" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
</svg>
