cases:
  - name: probe-degradation-empty-prompt
    domain: stability
    description: "Handling of whitespace-only input"
    input:
      prompt: "   "
    judge_hint: >
      PASS: Agent responds coherently (e.g., asks for clarification, notes empty input),
      does not crash, and maintains normal operation.
      FAIL: Agent crashes, returns a traceback/error stack, throws an unhandled exception,
      or becomes unresponsive due to whitespace-only input.

